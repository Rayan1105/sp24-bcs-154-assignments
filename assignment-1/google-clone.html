<!DOCTYPE html>
<title>Google-clone by Rayan</title>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    img {
      width: 300px;
      margin-bottom: 20px;
    }

    input {
      border: none;
      padding: 16px 20px;
      font-size: 18px;
      width: 600px;
      border-radius: 30px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body>
  <img src="Google_2015_logo.svg.webp" alt="Google Logo">
  <input type="text" placeholder="Search Google or type a URL">
</body>
</html>
